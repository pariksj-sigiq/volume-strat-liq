name: Deploy EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: liq-sweep-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Test and deploy to ap-south-1 EC2
    runs-on:
      - self-hosted
      - liq-sweep
      - ap-south-1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python3.11 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[dev]"

      - name: Run Node tests
        run: npm test

      - name: Run Python tests
        run: .venv/bin/python -m pytest -q tests

      - name: Static checks
        run: |
          node --check src/upstox/backfill.mjs
          node --check app/static/app.js
          test -s web/dist/index.html
          test -n "$(find web/dist/assets -maxdepth 1 -type f -name '*.js' -print -quit)"
          test -n "$(find web/dist/assets -maxdepth 1 -type f -name '*.css' -print -quit)"
          .venv/bin/python -m py_compile app/server.py backtest/liquidity_sweep_backtest.py backtest/intraday_volume_spike.py backtest/options_overlay.py

      - name: Deploy application without touching data
        run: sudo bash scripts/ec2_deploy.sh "$GITHUB_WORKSPACE"
